<!--I chose to create a grid layout for the butterfly images to make the layout look neat and organised.
I wanted to use a dark theme for the background that would make my butterfly images more vibrant and 
stand out.
At the top I made a header for the title and used Italic to give it a cursive, elegant look. I also
made the colour a light shade of pink. Theres a subheading that explains what action the user has to take.
4 classes - 
.butterfly-grid (organises the images into a grid of 3x5)
.img-cell (i used this to adjust the image container which changes the height between images above and below them)
.butterfly-label
.butterfly-->

<body style="background-color: rgb(12, 10, 11);">
